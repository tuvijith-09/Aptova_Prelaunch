<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Filter for drop shadow -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#042F2E" flood-opacity="0.35" />
    </filter>
    
    <!-- Gradient 1: Deep Teal to Bright Emerald/Mint -->
    <linearGradient id="grad-teal-mint" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0D9488" />   <!-- Deep Teal -->
      <stop offset="100%" stop-color="#10B981" /> <!-- Bright Emerald/Mint -->
    </linearGradient>
  </defs>

  <g id="icon">
    <!-- Soft Mint Glow Card Background -->
    <rect x="32" y="32" width="448" height="448" rx="96" fill="#D1FAE5" opacity="0.15" />
    
    <!-- A-Frame (Teal to Mint Gradient) -->
    <path d="M 180 370 L 256 160 L 332 370" fill="none" stroke="url(#grad-teal-mint)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- White Background Stroke for Separation -->
    <path d="M 200 275 L 256 325 L 375 180" fill="none" stroke="#FFFFFF" stroke-width="64" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Checkmark (Deep Forest Teal: #042F2E) with Drop Shadow -->
    <path d="M 200 275 L 256 325 L 375 180" fill="none" stroke="#042F2E" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" filter="url(#drop-shadow)" />
    
    <!-- Luminous Spark Tip Node (Mint Green: #34A853) with Drop Shadow -->
    <circle cx="375" cy="180" r="14" fill="#34A853" filter="url(#drop-shadow)" />
  </g>
</svg>
